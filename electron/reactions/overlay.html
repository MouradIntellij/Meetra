<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reaction Overlay</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }
    #layer {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .bubble {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transform: translateX(-50%);
      animation: floatReaction 3.5s ease-out forwards;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.45));
    }
    .emoji {
      font-size: 54px;
      line-height: 1;
    }
    .name {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f8fafc;
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    @keyframes floatReaction {
      0% { opacity: 0; transform: translateX(-50%) translateY(0) scale(0.55); }
      15% { opacity: 1; transform: translateX(-50%) translateY(-18px) scale(1.15); }
      80% { opacity: 1; transform: translateX(-50%) translateY(-180px) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-240px) scale(0.85); }
    }
  </style>
</head>
<body>
  <div id="layer"></div>
  <script>
    const layer = document.getElementById('layer');

    function showReaction(payload) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.style.left = `${30 + Math.random() * 40}%`;
      bubble.style.bottom = 'max(190px, 20vh)';

      const emoji = document.createElement('div');
      emoji.className = 'emoji';
      emoji.textContent = payload?.emoji || '👍';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = payload?.userName || 'Participant';

      bubble.appendChild(emoji);
      bubble.appendChild(name);
      layer.appendChild(bubble);

      window.setTimeout(() => {
        bubble.remove();
      }, 3600);
    }

    window.electronAPI?.onReaction?.((payload) => showReaction(payload));
  </script>
</body>
</html>
