<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Presenter Toolbar</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    html, body {
      margin: 0;
      background: transparent;
      overflow: hidden;
    }
    .bar {
      margin: 10px;
      height: 68px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px 0 16px;
      -webkit-app-region: drag;
    }
    .meta {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34,197,94,0.18);
      flex-shrink: 0;
    }
    .text {
      min-width: 0;
    }
    .title {
      color: #f8fafc;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .subtitle {
      margin-top: 3px;
      color: rgba(226,232,240,0.72);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    button {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    button.stop {
      border-color: rgba(248,113,113,0.28);
      background: rgba(127,29,29,0.72);
      color: #fee2e2;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="meta">
      <div class="dot"></div>
      <div class="text">
        <div class="title">Vous presentez</div>
        <div id="label" class="subtitle">Source active</div>
      </div>
    </div>
    <div class="actions">
      <button id="change">Changer la source</button>
      <button id="stop" class="stop">Arreter</button>
    </div>
  </div>

  <script>
    const label = document.getElementById('label');
    const stop = document.getElementById('stop');
    const change = document.getElementById('change');

    stop.addEventListener('click', () => window.electronAPI?.presenterCommand?.({ type: 'stop-share' }));
    change.addEventListener('click', () => window.electronAPI?.presenterCommand?.({ type: 'change-source' }));

    window.electronAPI?.onPresenterState?.((payload) => {
      label.textContent = payload?.label || 'Source active';
    });
  </script>
</body>
</html>
